
<form (fsForm)="save()">
  <fs-dialog>
    <fs-dialog-title [back]="true">
      Back Dialog
      <ng-template fsDialogSubtitle>
        This is the subtitle
      </ng-template>
    </fs-dialog-title>
    <mat-dialog-content>
      <div class="text">
        @for (input of inputs; track input) {
          <p>{{input}}</p>
        }
      </div>
    </mat-dialog-content>
  </fs-dialog>
</form>
